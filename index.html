<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Centrado</title>
    <style>
        /* Centra el contenedor en el medio de cualquier pantalla */
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f; /* Fondo oscuro elegante */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* Contenedor flexible y responsivo */
        .wrapper {
            width: 60%;          /* En celulares usa el 90% del ancho */
            max-width: 350px;    /* En pantallas grandes no supera este tamaño */
            padding: 10px;
        }
        /* El video se adapta al contenedor sin perder su forma */
        video {
            width: 100%;
            height: auto;
            border-radius: 12px; /* Bordes redondeados modernos */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* Sombra suave */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Reemplaza "video.mp4" por el nombre de tu archivo -->
        <video controls autoplay muted playsinline loop>
            <source src="Arquitecto (2).mp4" type="video/mp4">
            Tu navegador no soporta este video.
        </video>
    </div>

</body>
</html>
